        :root {
            /* Fondo Azul Oscuro Profundo */
            --bg-page: #0b1120; 
            --shadow-page-dark: #060a13;
            --shadow-page-light: #10182d;
            
            /* Recuadros Azules Claros/Medios */
            --bg-card: #1e3a8a; 
            --shadow-card-dark: #152961;
            --shadow-card-light: #274bb3;
        }

        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-page); color: white; }
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-page); }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        /* Neumorphism Base Styles */
        .neo-panel {
            background-color: var(--bg-card);
            border-radius: 1.25rem;
            box-shadow: 8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light);
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .neo-panel-custom {
            border-radius: 1.25rem;
            box-shadow: 8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .neo-inset {
            background-color: var(--bg-card);
            border-radius: 0.75rem;
            box-shadow: inset 4px 4px 8px var(--shadow-card-dark), inset -4px -4px 8px var(--shadow-card-light);
            color: white;
            border: 1px solid rgba(255,255,255,0.02);
        }
        
        .neo-button {
            background-color: var(--bg-card);
            border-radius: 9999px;
            box-shadow: 4px 4px 8px var(--shadow-card-dark), -4px -4px 8px var(--shadow-card-light);
            color: white;
            transition: all 0.2s ease-in-out;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .neo-button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-card-dark), inset -4px -4px 8px var(--shadow-card-light);
            border-color: transparent;
        }

        /* Page Level Neumorphism */
        .neo-page-panel {
            background-color: var(--bg-page);
            border-radius: 1.25rem;
            box-shadow: 8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light);
            color: white;
        }

        .neo-page-inset {
            background-color: var(--bg-page);
            border-radius: 9999px;
            box-shadow: inset 4px 4px 8px var(--shadow-page-dark), inset -4px -4px 8px var(--shadow-page-light);

            background-color: var(--bg-page);
            border-radius: 9999px;
            box-shadow: 4px 4px 8px var(--shadow-page-dark), -4px -4px 8px var(--shadow-page-light);
            transition: all 0.2s ease-in-out;

            border: 1px solid rgba(255,255,255,0.02);

        // --- GLOBAL HELPER FUNCTIONS ---
        const cleanFirestoreData = (obj) => {
            const cleaned = {};
            Object.keys(obj).forEach(key => {
                if (obj[key] !== undefined) {
                    cleaned[key] = obj[key];
                }
            });
            return cleaned;
        };

        const toLocalDateString = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const parseDate = (str) => {
            if(!str) return new Date();
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        };
        
        const getBillingMonth = () => {
            const today = new Date(); 
            if (today.getDate() >= 15) {
                return new Date(today.getFullYear(), today.getMonth() + 1, 1);
            }
            return new Date(today.getFullYear(), today.getMonth(), 1);
        };

        const getPaymentForMonth = (tx, month, year) => {
             let date = parseDate(tx.date);
             if (tx.subtype === 'credit' && date.getDate() >= 15) {
                 date = new Date(date.getFullYear(), date.getMonth() + 1, 1);
             }
             if (tx.installments > 1) {
                 const start = date.getFullYear() * 12 + date.getMonth();
                 const target = year * 12 + month;
                 if (target >= start && target < start + tx.installments) return tx.amount / tx.installments;
                 return 0;
             }
             if (tx.subtype === 'fixed') return tx.amount;
             if (date.getMonth() === month && date.getFullYear() === year) return tx.amount;
             return 0;
        };

            const getQuotaInfo = (tx) => {
                if (tx.installments <= 1) return null;
                let date = parseDate(tx.date);
                if (tx.subtype === 'credit' && date.getDate() >= 15) {
                     date = new Date(date.getFullYear(), date.getMonth() + 1, 1);
                }
                const start = date.getFullYear() * 12 + date.getMonth();
                const target = year * 12 + monthIndex;
                const current = target - start + 1;
                return { current, total: tx.installments };
            };

            const groups = useMemo(() => {
                const grps = {};
                transactions.forEach(t => {
                    const val = getPaymentForMonth(t, monthIndex, year);
                    
                    if (val > 0) {
                        const gName = t.groupName || 'Varios';
                        const meta = groupMeta.find(g => g.name === gName); 
                        let color = meta ? meta.color : '#1e3a8a';
                        if (!meta) {
                            const lower = gName.toLowerCase();
                            if (lower.includes('naranja')) color = '#ea580c';
                            else if (lower.includes('galicia')) color = '#d97706';
                            else if (lower.includes('icbc')) color = '#dc2626';
                            else if (lower.includes('a pagar')) color = '#475569';
                            else if (lower.includes('ingreso')) color = '#059669';
                        }
                        
                        const monthKey = `${year}-${monthIndex}`;
                        const isPaidForMonth = t.paidMonths && t.paidMonths.includes(monthKey);

                        if (!grps[gName]) grps[gName] = { total: 0, items: [], color };
                        grps[gName].items.push({ ...t, currentAmt: val, quotaInfo: getQuotaInfo(t), isPaidForMonth });
                        grps[gName].total += val;
                    }
                });
                
                Object.values(grps).forEach(group => {
                    group.items.sort((a, b) => b.currentAmt - a.currentAmt);
                });
                
                return grps;

            if (Object.keys(groups).length === 0) return <div className="flex flex-col items-center justify-center py-10 text-slate-400 gap-4"><Icons.PieChart size={48} className="opacity-50" /><p>No hay movimientos en este mes.</p></div>;

                                </div>

                            {isExpanded && (

                                        className={`neo-panel p-3 md:p-5 flex items-center gap-4 transition-all duration-200 cursor-pointer border-l-4 ${tx.isPaidForMonth ? 'opacity-60 bg-[#064e3b]' : ''}`}

                                                <span className={`font-bold text-sm md:text-lg whitespace-nowrap ${tx.type === 'income' ? 'text-emerald-300' : tx.isPaidForMonth ? 'line-through text-emerald-200' : 'text-white'}`}>

                                                        <span className={`text-[10px] md:text-xs font-mono font-bold ${tx.isPaidForMonth ? 'text-emerald-300' : 'text-sky-200'}`}>{tx.quotaInfo.current}/{tx.quotaInfo.total}</span>

        // --- APP LOGIC ---
        const App = () => {
            const [fixedMonthStr, setFixedMonthStr] = useState(localStorage.getItem('fixedMonthStr'));

            const [currentDate, setCurrentDate] = useState(() => {
                const saved = localStorage.getItem('fixedMonthStr');
                if (saved) {
                    const [y, m] = saved.split('-');
                    return new Date(Number(y), Number(m), 1);
                }
                return getBillingMonth();
            }); 
            
            const isMonthFixed = fixedMonthStr === `${currentDate.getFullYear()}-${currentDate.getMonth()}`;

            const [transactions, setTransactions] = useState([]);
            const [groupMeta, setGroupMeta] = useState([]); 
            const [view, setView] = useState('dashboard');
            const [selectedFutureMonth, setSelectedFutureMonth] = useState(null);
            const [installPrompt, setInstallPrompt] = useState(null); 
            const [checklistMode, setChecklistMode] = useState(false); 
            const [searchQuery, setSearchQuery] = useState("");
            
            const [showModal, setShowModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [showGroupModal, setShowGroupModal] = useState(false);
            const [showReceipt, setShowReceipt] = useState(null); 
            
            const [editingId, setEditingId] = useState(null);
            const [groupEditData, setGroupEditData] = useState({ oldName: '', newName: '', color: '' });
            const [importText, setImportText] = useState("");
            const [iconSearch, setIconSearch] = useState("");

            const [formData, setFormData] = useState({
                type: 'expense', subtype: 'one-time', amount: '', description: '', category: '', 
                groupName: 'A PAGAR', installments: 1, currentInstallment: 1, icon: 'shopping', color: '#1e3a8a'
            });

            const [dbReady, setDbReady] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const toggleFixedMonth = () => {
                const str = `${currentDate.getFullYear()}-${currentDate.getMonth()}`;
                if (isMonthFixed) {
                    localStorage.removeItem('fixedMonthStr');
                    setFixedMonthStr(null);
                } else {
                    localStorage.setItem('fixedMonthStr', str);
                    setFixedMonthStr(str);
                }
            };

            const navigateMonth = (offset) => {
                const newDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1);
                setCurrentDate(newDate);
            };

            const availableCategories = useMemo(() => {
                const cats = new Set(transactions.map(t => t.category).filter(Boolean));
                return Array.from(cats);
            }, [transactions]);
            
            const availableGroups = useMemo(() => {
                const groupSet = new Set();
                groupSet.add("A PAGAR"); groupSet.add("NARANJA"); groupSet.add("TARJETA GALICIA"); groupSet.add("ICBC"); groupSet.add("Ingresos"); 
                transactions.forEach(t => { if (t.groupName) groupSet.add(t.groupName); });
                groupMeta.forEach(g => { if (g.name) groupSet.add(g.name); });
                return Array.from(groupSet).sort();
            }, [transactions, groupMeta]);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setInstallPrompt(e); });
            }, []);

            const handleInstall = () => {
                if (!installPrompt) {
                    alert("Instrucciones: En el menú de tu navegador, selecciona 'Añadir a la pantalla de inicio' o 'Instalar aplicación'.");
                    return;
                }
                installPrompt.prompt();
                installPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') setInstallPrompt(null);
                });
            };

            useEffect(() => {
                const initDb = () => {
                    const { collection, query, orderBy, onSnapshot } = window.fb;
                    const db = window.firebaseDB;
                    const auth = window.firebaseAuth;
                    const signIn = window.signInAnonymously;

                    if (db && auth && signIn) {
                        signIn(auth).then(() => {
                            setDbReady(true);
                            onSnapshot(query(collection(db, TRANSACTIONS_COL), orderBy("date", "desc")), (snap) => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, GROUPS_COL), (snap) => setGroupMeta(snap.docs.map(d => d.data())));
                        }).catch(e => console.error(e));
                    }
                };
                if (window.firebaseDB) initDb();
                else window.addEventListener('firebase-modules-ready', initDb);
                return () => window.removeEventListener('firebase-modules-ready', initDb);
            }, []);

            const insights = useMemo(() => {
                const m = currentDate.getMonth(); const y = currentDate.getFullYear();
                
                const activeExpensesThisMonth = transactions.filter(t => {
                    if (t.type !== 'expense') return false;
                    return getPaymentForMonth(t, m, y) > 0;
                });

                const mostExpensive = [...activeExpensesThisMonth].sort((a,b) => getPaymentForMonth(b,m,y) - getPaymentForMonth(a,m,y)).slice(0, 5);
                
                const creditTx = activeExpensesThisMonth.filter(t => t.subtype === 'credit');
                
                const creditTxWithRemaining = creditTx.map(t => {
                    let txDate = parseDate(t.date);
                    if (txDate.getDate() >= 15) {
                        txDate = new Date(txDate.getFullYear(), txDate.getMonth() + 1, 1);
                    }
                    const startMonthIndex = txDate.getFullYear() * 12 + txDate.getMonth();
                    const currentMonthIndex = y * 12 + m;
                    const currentQuota = Math.max(1, currentMonthIndex - startMonthIndex + 1);
                    return { ...t, remaining: Math.max(0, (t.installments || 1) - currentQuota) };
                });

                const closestToFinish = creditTxWithRemaining.filter(t => t.remaining > 0).sort((a,b) => a.remaining - b.remaining).slice(0, 5);
                const longestRemaining = creditTxWithRemaining.filter(t => t.remaining > 0 && (t.amount/(t.installments||1)) > 20000).sort((a,b) => b.remaining - a.remaining).slice(0, 5);
                
                return { mostExpensive, closestToFinish, longestRemaining };
            }, [transactions, currentDate]);

            // Totals NO longer depend on whether a transaction is marked as paid
            const dashboardTotals = useMemo(() => {
                const m = currentDate.getMonth(); const y = currentDate.getFullYear(); let expense = 0; let income = 0;
                transactions.forEach(t => {
                    const val = getPaymentForMonth(t, m, y);
                    if (t.type === 'income') income += val;
                    else expense += val; 
                });
                return { expense, income, balance: income - expense };
            }, [transactions, currentDate]);

            const futureData = useMemo(() => {
                const data = [];
                for(let i=0; i<24; i++) {
                    const d = new Date(currentDate.getFullYear(), currentDate.getMonth() + i, 1); 
                    const m = d.getMonth(); const y = d.getFullYear(); let total = 0, tarjetas = 0;
                    transactions.forEach(t => {
                        const val = getPaymentForMonth(t, m, y);
                        if(t.type === 'expense' && val > 0) {
                             total += val; 
                             if (t.installments > 1 || t.groupName.toLowerCase().includes('tarjeta')) tarjetas += val; 
                        }
                    });
                    data.push({ name: d.toLocaleString('es-ES', { month: 'short' }).toUpperCase() + " '" + y.toString().slice(2), total, tarjetas, index: m, year: y });
                }
                return data;
            }, [transactions, currentDate]);

            const exportToExcel = () => {
                const data = transactions.map(tx => ({ Fecha: tx.date, Descripción: tx.description, Grupo: tx.groupName, Categoría: tx.category, Monto_Total: tx.amount, Cuotas_Totales: tx.installments || 1, Tipo: tx.type === 'income' ? 'Ingreso' : 'Gasto' }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Finanzas");
                XLSX.writeFile(wb, "Finanzas_Familia.xlsx");
            };

            const togglePaid = async (tx, monthIndex, year) => { 
                if (!dbReady) return; 
                try { 
                    const monthKey = `${year}-${monthIndex}`;
                    const paidMonths = tx.paidMonths || [];
                    const isCurrentlyPaid = paidMonths.includes(monthKey);
                    const newPaidMonths = isCurrentlyPaid ? paidMonths.filter(m => m !== monthKey) : [...paidMonths, monthKey];

                    const { doc, updateDoc } = window.fb; 
                    await updateDoc(doc(window.firebaseDB, TRANSACTIONS_COL, tx.id), { paidMonths: newPaidMonths }); 
                } catch (e) { console.error(e); alert("Error al actualizar pago."); } 
            };

            const toggleGroupPaid = async (groupItems, monthIndex, year) => {
                 if (!dbReady) return; 
                 try {
                     const monthKey = `${year}-${monthIndex}`;
                     const { doc, writeBatch } = window.fb;
                     const batch = writeBatch(window.firebaseDB);
                     
                     const allPaid = groupItems.every(tx => tx.paidMonths && tx.paidMonths.includes(monthKey));
                     
                     groupItems.forEach(tx => {
                         const paidMonths = tx.paidMonths || [];
                         let newPaidMonths;
                         if (allPaid) {
                             newPaidMonths = paidMonths.filter(m => m !== monthKey);
                         } else {
                             newPaidMonths = paidMonths.includes(monthKey) ? paidMonths : [...paidMonths, monthKey];
                         }
                         batch.update(doc(window.firebaseDB, TRANSACTIONS_COL, tx.id), { paidMonths: newPaidMonths });
                     });
                     
                     await batch.commit();
                 } catch (e) { console.error(e); alert("Error al tachar grupo."); }
            };

            const openAdd = () => { setEditingId(null); setFormData({ type: 'expense', subtype: 'one-time', amount: '', description: '', category: '', groupName: 'A PAGAR', installments: 1, currentInstallment: 1, icon: 'shopping', color: '#1e3a8a', date: toLocalDateString(currentDate) }); setIconSearch(""); setShowModal(true); };
            const openEdit = (tx) => { 
                setEditingId(tx.id); 
                let currentQuota = 1; 
                if(tx.subtype === 'credit') {
                    const txDate = parseDate(tx.date); 
                    const monthsDiff = (currentDate.getFullYear() - txDate.getFullYear()) * 12 + (currentDate.getMonth() - txDate.getMonth());
                    currentQuota = Math.max(1, monthsDiff + 1);
                }
                setFormData({ ...tx, amount: tx.amount, currentInstallment: currentQuota }); 
                setIconSearch("");
                setShowModal(true); 
            };
            
            const saveTx = async () => {
                if (!formData.description) return alert("Por favor ingresa una descripción.");
                if (!formData.amount || Number(formData.amount) <= 0) return alert("Por favor ingresa un monto válido mayor a 0.");

                try {
                    let finalDate = editingId ? formData.date : formData.date || toLocalDateString(currentDate);
                    
                    if (formData.subtype === 'credit' && formData.currentInstallment > 1) { 
                        const targetDate = new Date(currentDate); 
                        targetDate.setMonth(targetDate.getMonth() - (formData.currentInstallment - 1)); 
                        finalDate = toLocalDateString(targetDate); 
                    }
                    if(formData.date && formData.date !== finalDate && editingId) finalDate = formData.date; 

                    let txData = { ...formData, amount: Number(formData.amount), date: finalDate };
                    delete txData.currentInstallment; 
                    if (txData.type === 'income') { 
                        if (!txData.groupName || txData.groupName === 'A PAGAR') txData.groupName = "Ingresos"; 
                    }
                    
                    txData = cleanFirestoreData(txData);

                    const { collection, addDoc, updateDoc, doc } = window.fb;
                    if (editingId) await updateDoc(doc(window.firebaseDB, TRANSACTIONS_COL, editingId), txData); 
                    else await addDoc(collection(window.firebaseDB, TRANSACTIONS_COL), txData);
                    setShowModal(false);
                } catch(e) { console.error(e); alert("Error al guardar: " + e.message); }
            };

            const deleteTx = async () => { if (confirm('¿Eliminar definitivamente este movimiento?') && dbReady) { await window.fb.deleteDoc(window.fb.doc(window.firebaseDB, TRANSACTIONS_COL, editingId)); setShowModal(false); } };
            const openGroupEdit = (name, currentColor) => { setGroupEditData({ oldName: name, newName: name, color: currentColor }); setShowGroupModal(true); };
            
            const saveGroupEdit = async () => { 
                if (!groupEditData.newName.trim()) return alert("El nombre del grupo no puede estar vacío.");
                try {
                    const { oldName, newName, color } = groupEditData; 
                    const { doc, writeBatch, collection, query, where, getDocs } = window.fb;
                    const batch = writeBatch(window.firebaseDB); 
                    
                    batch.set(doc(window.firebaseDB, GROUPS_COL, newName), { name: newName, color: color }); 
                    if (oldName !== newName) { 
                        batch.delete(doc(window.firebaseDB, GROUPS_COL, oldName)); 
                    } 
                    const snap = await getDocs(query(collection(window.firebaseDB, TRANSACTIONS_COL), where("groupName", "==", oldName))); 
                    snap.forEach(d => batch.update(d.ref, { groupName: newName })); 
                    await batch.commit(); 
                    setShowGroupModal(false); 
                } catch(e) { console.error(e); alert("Error al guardar grupo."); }
            };

            const deleteGroup = async () => { 
                if (confirm(`¿Seguro que deseas eliminar el grupo "${groupEditData.oldName}"? \n\n(Sus gastos no se borrarán, pasarán al grupo "A PAGAR")`)) {
                    try {
                        const { doc, writeBatch, collection, query, where, getDocs } = window.fb;
                        const batch = writeBatch(window.firebaseDB);
                        batch.delete(doc(window.firebaseDB, GROUPS_COL, groupEditData.oldName));
                        const snap = await getDocs(query(collection(window.firebaseDB, TRANSACTIONS_COL), where("groupName", "==", groupEditData.oldName)));
                        snap.forEach(d => batch.update(d.ref, { groupName: 'A PAGAR' }));
                        await batch.commit();
                        setShowGroupModal(false);
                    } catch(e) { console.error(e); alert("Error al eliminar grupo."); }
                }
            };

            const parseAndImport = async () => {
                if(!dbReady) return; setIsSaving(true);
                const { doc, writeBatch } = window.fb;
                const batch = writeBatch(window.firebaseDB);
                const segments = importText.split('$');
                if (segments.length < 2) { alert("Error formato."); setIsSaving(false); return; }
                let currentDesc = segments[0].trim();
                let currentGroup = "Importado";
                if(currentDesc.includes("A PAGAR")) currentGroup = "A PAGAR";
                for (let i = 1; i < segments.length; i++) {
                    const match = segments[i].trim().match(/^([\d\.]+)/);
                    if (match) {
                        const amount = Number(match[1].replace(/\./g, ''));
                        const rest = segments[i].trim().substring(match[0].length).trim();
                        const quotaMatch = rest.match(/^(\d+)\/(\d+)/);
                        let quotaT = quotaMatch ? Number(quotaMatch[2]) : 1;
                        let nextDesc = quotaMatch ? rest.substring(quotaMatch[0].length).trim() : rest;
                        if (currentDesc.includes("NARANJA")) currentGroup = "NARANJA";
                        if (currentDesc.includes("GALICIA")) currentGroup = "TARJETA GALICIA";
                        if (currentDesc.includes("ICBC")) currentGroup = "ICBC";
                        const ref = doc(window.firebaseDB, TRANSACTIONS_COL, Math.random().toString(36).substr(2,9));
                        const txData = cleanFirestoreData({ type: 'expense', subtype: quotaT > 1 ? 'credit' : 'fixed', amount: amount * quotaT, description: currentDesc.replace(/A PAGAR|NARANJA|TARJETA GALICIA|ICBC/g, '').trim() || "Gasto", category: 'Varios', groupName: currentGroup, date: toLocalDateString(new Date()), installments: quotaT, icon: 'shopping', color: '#1e3a8a' });
                        batch.set(ref, txData);
                        currentDesc = nextDesc;
                    }
                }
                try { await batch.commit(); } catch(e){ console.error(e); alert("Error importando.");}
                setIsSaving(false); setShowImportModal(false); setImportText("");
            };

            const filteredTransactions = transactions.filter(t => 
                !searchQuery || 
                (t.description || "").toLowerCase().includes(searchQuery.toLowerCase()) || 
                (t.groupName || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
                (t.category || "").toLowerCase().includes(searchQuery.toLowerCase())
            );

            const filteredIcons = ICON_GALLERY.filter(i => i.label.toLowerCase().includes(iconSearch.toLowerCase()) || i.name.toLowerCase().includes(iconSearch.toLowerCase()));

            return (
                <div className="w-full max-w-7xl mx-auto p-4 md:p-8 pb-24 min-h-[100dvh]">
                    {fixedMonthStr && (
                        <div className="fixed top-0 left-0 right-0 bg-emerald-600 text-white text-center text-[10px] font-bold py-1.5 z-50 tracking-widest uppercase shadow-md flex justify-center items-center gap-2">
                            <Icons.Pin size={12}/> Tienes un mes fijado por defecto
                        </div>
                    )}
                    <header className={`flex justify-between items-center mb-8 ${fixedMonthStr ? 'mt-4' : ''}`}>
                        <div className="flex items-center gap-4">
                            <div className="neo-page-panel p-3 text-white">
                                <Icons.Wallet size={28} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-extrabold text-white tracking-tight">Finanzas Familiares</h1>
                                <div className="flex items-center gap-2 mt-1">
                                    <button onClick={() => navigateMonth(-1)} className="neo-page-button w-8 h-8" title="Mes anterior">
                                        <Icons.ChevronLeft size={16} />
                                    </button>
                                    <p className="text-blue-400 bg-white/5 text-xs font-mono font-bold uppercase tracking-widest min-w-[120px] text-center select-none py-1 rounded-md">
                                        {currentDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' })}
                                    </p>
                                    <button onClick={() => navigateMonth(1)} className="neo-page-button w-8 h-8" title="Mes siguiente">
                                        <Icons.ChevronRight size={16} />
                                    </button>
                                    <button onClick={toggleFixedMonth} className={`neo-page-button w-8 h-8 ml-2 transition-colors ${isMonthFixed ? 'text-emerald-400 neo-page-inset' : 'text-slate-500'}`} title={isMonthFixed ? "Desfijar mes" : "Fijar este mes"}>
                                        <Icons.Pin size={14} />
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-3">
                            <button onClick={() => setChecklistMode(!checklistMode)} className={`w-12 h-12 ${checklistMode ? 'neo-page-inset text-emerald-500' : 'neo-page-button text-slate-400'}`} title="Modo Tachar Pagos"><Icons.ClipboardCheck size={20} /></button>
                            <button onClick={handleInstall} className="neo-page-button w-12 h-12 text-slate-400 hidden sm:flex" title="Instalar App"><Icons.Download size={20} /></button>
                            <button onClick={exportToExcel} className="neo-page-button w-12 h-12 text-slate-400 hidden sm:flex" title="Exportar Excel"><Icons.FileSpreadsheet size={20} /></button>
                            <button onClick={() => setShowImportModal(true)} className="neo-page-button w-12 h-12 text-slate-400 hidden sm:flex" title="Importar"><Icons.UploadCloud size={20} /></button>
                            <button onClick={openAdd} className="neo-panel w-12 h-12 flex items-center justify-center transition-all hover:scale-105 active:scale-95"><Icons.Plus size={24} className="text-white"/></button>
                        </div>
                    </header>

                    <div className="hidden md:flex gap-4 mb-8">
                        <button onClick={() => setView('dashboard')} className={`px-6 py-3 font-bold transition-all ${view === 'dashboard' ? 'neo-page-inset text-blue-400' : 'neo-page-button text-slate-400 hover:text-blue-300'}`}>Resumen</button>
                        <button onClick={() => setView('future')} className={`px-6 py-3 font-bold transition-all ${view === 'future' ? 'neo-page-inset text-blue-400' : 'neo-page-button text-slate-400 hover:text-blue-300'}`}>Futuro</button>
                        <button onClick={() => setView('insights')} className={`px-6 py-3 font-bold transition-all ${view === 'insights' ? 'neo-page-inset text-blue-400' : 'neo-page-button text-slate-400 hover:text-blue-300'}`}>Análisis</button>
                    </div>

                    <main className="flex-1">
                        {view === 'dashboard' && (
                            <div className="animate-in space-y-8">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                                    <NeoCard className="bg-[#059669] border-none shadow-none" style={{boxShadow: '8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light)'}}>
                                        <p className="text-emerald-100 text-xs font-bold uppercase tracking-widest mb-1">Ingresos</p>
                                        <h2 className="text-3xl font-bold text-white tracking-tighter">+${dashboardTotals.income.toLocaleString('es-AR')}</h2>
                                    </NeoCard>
                                    <NeoCard className="bg-[#e11d48] border-none shadow-none" style={{boxShadow: '8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light)'}}>
                                        <p className="text-rose-100 text-xs font-bold uppercase tracking-widest mb-1">A Pagar</p>
                                        <h2 className="text-3xl font-bold text-white tracking-tighter">-${dashboardTotals.expense.toLocaleString('es-AR')}</h2>
                                    </NeoCard>
                                    <NeoCard className="bg-[#0284c7] border-none shadow-none" style={{boxShadow: '8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light)'}}>
                                        <p className="text-sky-100 text-xs font-bold uppercase tracking-widest mb-1">Saldo Restante</p>
                                        <h2 className="text-4xl font-extrabold text-white tracking-tighter">${dashboardTotals.balance.toLocaleString('es-AR')}</h2>
                                    </NeoCard>
                                </div>
                                
                                <div className="neo-page-inset p-2 mb-6 flex items-center">
                                    <input 
                                        value={searchQuery}
                                        onChange={(e) => setSearchQuery(e.target.value)}
                                        placeholder="Buscar gasto, categoría o grupo..."
                                        className="flex-1 bg-transparent px-4 py-2 text-white font-medium outline-none"
                                    />
                                    <div className="p-2 text-blue-400"><Icons.Search size={20}/></div>
                                </div>

                                {transactions.length === 0 ? <div className="text-center py-10 text-slate-500 font-mono">No hay datos para este mes.</div> : 
                                 filteredTransactions.length === 0 ? <div className="text-center py-10 text-slate-500 font-mono">No se encontraron resultados para "{searchQuery}".</div> :
                                    <GroupedList transactions={filteredTransactions} monthIndex={currentDate.getMonth()} year={currentDate.getFullYear()} onSelect={setShowReceipt} onEdit={openEdit} groupMeta={groupMeta} onEditGroup={openGroupEdit} checklistMode={checklistMode} onTogglePaid={togglePaid} onToggleGroupPaid={toggleGroupPaid} />
                                }
                            </div>
                        )}
                        
                        {view === 'future' && (
                            <div className="animate-in space-y-6">
                                {!selectedFutureMonth ? (
                                    <>
                                        <NeoCard className="h-72">
                                            <h3 className="font-bold text-white mb-4 uppercase tracking-wider">Proyección 2025-2026</h3>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <AreaChart data={futureData} margin={{top:5, right:0, left:-20, bottom:20}}>
                                                    <defs><linearGradient id="colorTotal" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor="#fff" stopOpacity={0.6}/><stop offset="95%" stopColor="#fff" stopOpacity={0}/></linearGradient></defs>
                                                    <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.1)" vertical={false} />
                                                    <XAxis dataKey="name" stroke="rgba(255,255,255,0.6)" tick={{fill:'white', fontSize:10}} axisLine={false} tickLine={false} />
                                                    <YAxis stroke="rgba(255,255,255,0.6)" tick={{fill:'white', fontSize:10}} axisLine={false} tickLine={false} tickFormatter={v=>`${(v/1000).toFixed(0)}k`} />
                                                    <Tooltip contentStyle={{backgroundColor:'#1e293b', border:'none', borderRadius:'8px'}} itemStyle={{color:'#fff'}} formatter={(v)=>`$${v.toLocaleString('es-AR')}`} />
                                                    <Area type="monotone" dataKey="total" stroke="#fff" strokeWidth={3} fillOpacity={1} fill="url(#colorTotal)" />
                                                </AreaChart>
                                            </ResponsiveContainer>
                                        </NeoCard>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                            {futureData.map(m => (
                                                <NeoCard key={m.name} onClick={() => setSelectedFutureMonth({index: m.index, year: m.year})} className="group">
                                                    <div className="flex justify-between items-center mb-3"><span className="font-bold text-sm text-blue-200 group-hover:text-white transition-colors">{m.name}</span><Icons.ChevronRight size={16} className="text-white/50" /></div>
                                                    <div className="text-xl font-bold tracking-tighter text-white">${m.total.toLocaleString('es-AR')}</div>
                                                </NeoCard>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="animate-in">
                                        <button onClick={() => setSelectedFutureMonth(null)} className="neo-page-button px-4 py-2 text-blue-400 font-bold mb-6 flex items-center gap-2"><Icons.ChevronLeft size={20} /> Volver a Proyección</button>
                                        <GroupedList transactions={transactions} monthIndex={selectedFutureMonth.index} year={selectedFutureMonth.year} onSelect={setShowReceipt} onEdit={openEdit} groupMeta={groupMeta} onEditGroup={openGroupEdit} checklistMode={checklistMode} onTogglePaid={togglePaid} onToggleGroupPaid={toggleGroupPaid} />
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {view === 'insights' && (
                            <div className="animate-in space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <NeoCard className="flex flex-col h-80">
                                        <h3 className="font-bold text-rose-300 mb-6 uppercase tracking-wider flex items-center gap-2"><Icons.TrendingUp size={18}/> Gastos Más Caros</h3>
                                        <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                                            {insights.mostExpensive.map(t => (
                                                <div key={t.id} className="flex justify-between items-center neo-inset p-4">
                                                    <span className="text-sm font-medium text-white">{t.description}</span>
                                                    <span className="text-sm font-bold text-rose-300">${(t.amount/(t.installments||1)).toLocaleString('es-AR')}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </NeoCard>
                                    <NeoCard className="flex flex-col h-80">
                                        <h3 className="font-bold text-emerald-300 mb-6 uppercase tracking-wider flex items-center gap-2"><Icons.Award size={18}/> Cerca de Terminar</h3>
                                        <div className="flex-1 overflow-y-auto space-y-4 pr-2">
                                            {insights.closestToFinish.map(t => (
                                                <div key={t.id} className="flex justify-between items-center neo-inset p-4 border-l-4 border-emerald-400">
                                                    <div>
                                                        <div className="text-sm font-medium text-white">{t.description}</div>
                                                        <div className="text-xs text-emerald-200 mt-1 font-mono">Faltan {t.remaining} cuotas</div>
                                                    </div>
                                                    <span className="text-sm font-bold text-emerald-300">${(t.amount/t.installments).toLocaleString('es-AR')}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </NeoCard>
                                    <NeoCard className="flex flex-col h-80 md:col-span-2">
                                        <h3 className="font-bold text-amber-300 mb-6 uppercase tracking-wider flex items-center gap-2"><Icons.Clock size={18}/> Deudas a Largo Plazo (>$20k)</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 overflow-y-auto pr-2">
                                            {insights.longestRemaining.map(t => (
                                                <div key={t.id} className="flex justify-between items-center neo-inset p-4 border-l-4 border-amber-400">
                                                     <div>
                                                        <div className="text-sm font-medium text-white">{t.description}</div>
                                                        <div className="text-xs text-amber-200 mt-1 font-mono">Faltan {t.remaining} cuotas</div>
                                                    </div>
                                                    <span className="text-sm font-bold text-amber-300">${(t.amount/t.installments).toLocaleString('es-AR')}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </NeoCard>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* IMPORT MODAL */}
                    {showImportModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm px-4">
                            <div className="neo-page-panel w-full max-w-lg p-6 animate-in flex flex-col h-[80vh]">
                                <div className="flex justify-between items-center mb-4"><h3 className="font-bold text-white text-lg">Importar Datos</h3><button onClick={() => setShowImportModal(false)}><Icons.X className="text-slate-400 hover:text-white"/></button></div>
                                <div className="flex-1 flex flex-col gap-4 overflow-y-auto">
                                    <p className="text-xs text-slate-400 font-medium">Pega aquí tu lista de gastos.</p>
                                    <textarea className="w-full flex-1 neo-page-inset p-4 text-xs font-mono text-white outline-none resize-none" value={importText} onChange={e => setImportText(e.target.value)}></textarea>
                                </div>
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setShowImportModal(false)} className="flex-1 py-3 neo-page-button text-slate-400 font-bold">Cancelar</button>
                                    <button onClick={parseAndImport} disabled={isSaving || !importText} className="flex-1 py-3 neo-panel font-bold flex items-center justify-center gap-2">{isSaving ? 'Procesando...' : <><Icons.Check size={18}/> Procesar</>}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* RECEIPT MODAL */}
                    <ReceiptModal tx={showReceipt} onClose={() => setShowReceipt(null)} onEdit={openEdit} />

                    {/* ADD/EDIT MODAL */}
                    {showModal && (
                        <div className="fixed inset-0 z-50 flex items-end md:items-center justify-center bg-slate-900/80 backdrop-blur-sm p-0 md:p-4">
                            <div className="neo-panel w-full md:max-w-2xl h-[95vh] md:h-auto flex flex-col overflow-hidden animate-in">
                                <div className="p-5 flex justify-between items-center">
                                    <h3 className="font-bold text-white flex items-center gap-3"><div className="p-2 neo-inset text-white">{editingId ? <Icons.Edit3 size={16}/> : <Icons.Plus size={16}/>}</div> {editingId ? 'Editar' : 'Nuevo'}</h3>
                                    <button onClick={() => setShowModal(false)} className="neo-button w-10 h-10"><Icons.X size={18}/></button>
                                </div>
                                <div className="p-6 overflow-y-auto flex-1 space-y-6">
                                    {/* Type Toggle */}
                                    <div className="flex neo-inset p-1">
                                        <button onClick={() => setFormData({...formData, type: 'expense'})} className={`flex-1 py-3 rounded-lg text-sm font-bold transition-all ${formData.type === 'expense' ? 'neo-panel' : 'text-blue-300'}`}>Egreso</button>
                                        <button onClick={() => setFormData({...formData, type: 'income', color: '#10b981'})} className={`flex-1 py-3 rounded-lg text-sm font-bold transition-all ${formData.type === 'income' ? 'bg-emerald-600 text-white shadow-md' : 'text-blue-300'}`}>Ingreso</button>
                                    </div>

                                    <div className="text-center py-4">
                                        <label className="text-xs text-blue-200 uppercase font-bold tracking-widest">Monto Total</label>
                                        <input type="number" placeholder="0" value={formData.amount} onChange={e => setFormData({...formData, amount: e.target.value})} className="bg-transparent text-5xl font-bold text-center text-white w-full focus:outline-none placeholder:text-white/50 mt-2" autoFocus />
                                    </div>
                                    
                                    {formData.type === 'expense' && (
                                        <div className="flex gap-2 overflow-x-auto pb-2">
                                            {[{id:'one-time', label:'Único'}, {id:'fixed', label:'Fijo'}, {id:'credit', label:'Tarjeta'}].map(opt => (
                                                <button key={opt.id} onClick={() => setFormData({...formData, subtype: opt.id})} className={`px-5 py-3 rounded-xl text-xs font-bold transition-all ${formData.subtype === opt.id ? 'neo-inset text-white' : 'neo-panel text-blue-200'}`}>{opt.label}</button>
                                            ))}
                                        </div>
                                    )}

                                    <div className="space-y-4">
                                        <div className="neo-inset p-2">
                                            <input type="text" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})} className="w-full bg-transparent px-4 py-2 text-white outline-none placeholder:text-blue-300 font-bold" placeholder="Descripción (Ej: Supermercado)" />
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            {formData.type === 'expense' ? (
                                                <div className="neo-inset p-2">
                                                    <input list="dynamic-groups" type="text" value={formData.groupName} onChange={e => setFormData({...formData, groupName: e.target.value})} className="w-full bg-transparent px-4 py-2 text-white outline-none text-sm placeholder:text-blue-300" placeholder="Grupo (A PAGAR)" />
                                                    <datalist id="dynamic-groups">{availableGroups.map(g => <option key={g} value={g} />)}</datalist>
                                                </div>
                                            ) : (
                                                <div className="neo-inset p-2 flex items-center px-4">
                                                    <label className="flex items-center gap-3 text-white text-sm cursor-pointer w-full font-medium">
                                                        <input type="checkbox" checked={formData.subtype === 'fixed'} onChange={(e) => setFormData({...formData, subtype: e.target.checked ? 'fixed' : 'one-time'})} className="accent-emerald-500 w-4 h-4" /> Fijo Mensual
                                                    </label>
                                                </div>
                                            )}
                                            
                                            <div className="neo-inset p-2">
                                                <input list="categoryList" type="text" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})} className="w-full bg-transparent px-4 py-2 text-white outline-none text-sm placeholder:text-blue-300" placeholder="Categoría (Varios)" />
                                                <datalist id="categoryList">{availableCategories.map(c => <option key={c} value={c} />)}</datalist>
                                            </div>
                                        </div>
                                        
                                        {formData.type === 'expense' && formData.subtype === 'credit' && (
                                            <div className="grid grid-cols-2 gap-4 neo-panel p-5 shadow-none border-t border-blue-400">

                                                <div>
                                                    <label className="text-xs text-white font-bold uppercase mb-2 block tracking-wider">Cuota Actual</label>
                                                    <select value={formData.currentInstallment || 1} onChange={e => setFormData({...formData, currentInstallment: Number(e.target.value), date: toLocalDateString(new Date(currentDate.getFullYear(), currentDate.getMonth() - (Number(e.target.value) - 1), 1)) })} className="w-full neo-inset p-3 text-white outline-none font-mono appearance-none">
                                                        {Array.from({length: formData.installments || 1}, (_, i) => i + 1).map(n => <option key={n} value={n}>Nº {n}</option>)}
                                                    </select>
                                                </div>
                                                
                                                <div className="col-span-2 pt-2">
                                                    <label className="text-xs text-blue-200 uppercase font-bold mb-2 block tracking-wider">Valor de la Cuota (Mensual)</label>
                                                    <div className="flex items-center gap-2 neo-inset px-4 py-2">
                                                        <span className="text-white font-bold">$</span>
                                                        <input 
                                                            type="number" 
                                                            placeholder="0"
                                                            value={formData.amount > 0 && formData.installments > 0 ? Math.round(formData.amount / formData.installments) : ''}
                                                            onChange={(e) => {
                                                                const val = Number(e.target.value);
                                                                setFormData({...formData, amount: val * (formData.installments || 1)});
                                                            }}
                                                            className="bg-transparent w-full text-white font-bold outline-none"
                                                        />
                                                    </div>
                                                </div>
                                            </div>
                                        )}
                                        
                                        <div>
                                            <label className="text-xs text-blue-200 font-bold uppercase mb-2 ml-1 block tracking-wider">Fecha de Compra/Inicio</label>
                                            <input type="date" value={formData.date} onChange={e => setFormData({...formData, date: e.target.value})} className="w-full neo-inset p-4 text-white outline-none font-mono text-sm" />
                                        </div>
                                    </div>
                                    
                                    <div className="neo-panel p-5 space-y-4 shadow-none border-t border-blue-400">
                                        <div>
                                            <label className="text-xs text-blue-200 uppercase font-bold mb-3 block tracking-wider">Color Etiqueta</label>
                                            <div className="flex gap-2 items-center flex-wrap">
                                                {COLOR_PALETTE.map(c => (<button key={c} onClick={() => setFormData({...formData, color: c})} className={`w-8 h-8 rounded-full border-2 transition-transform ${formData.color === c ? 'border-white scale-110' : 'border-transparent shadow-md'}`} style={{ backgroundColor: c }} />))}
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-blue-400 flex flex-col gap-3">
                                            <label className="text-xs text-blue-200 uppercase font-bold tracking-wider">Elige un Icono</label>
                                            <input 
                                                type="text" 
                                                placeholder="Buscar icono..." 
                                                value={iconSearch} 
                                                onChange={e => setIconSearch(e.target.value)} 
                                                className="w-full neo-inset px-4 py-2 text-white text-sm outline-none placeholder:text-blue-300"
                                            />
                                            <div className="grid grid-cols-5 gap-3 max-h-40 overflow-y-auto pr-2 pb-2">
                                                {filteredIcons.map(icon => (
                                                    <button key={icon.name} onClick={() => setFormData({...formData, icon: icon.name})} 
                                                        className={`aspect-square flex flex-col items-center justify-center rounded-xl transition-all ${formData.icon === icon.name ? 'border-2 border-white scale-105' : 'neo-panel hover:brightness-110'}`}
                                                        style={{ backgroundColor: formData.icon === icon.name ? (formData.color || '#1e3a8a') : 'var(--bg-card)', color: formData.icon === icon.name ? 'white' : 'rgba(255,255,255,0.6)' }}
                                                    >
                                                        {icon.icon}
                                                        <span className="text-[7px] mt-1 hidden md:block">{icon.label}</span>
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-5 flex gap-4">
                                    {editingId && <button onClick={deleteTx} className="neo-button w-14 h-14 text-rose-300 hover:text-rose-400"><Icons.Trash2 size={24} /></button>}
                                    <button onClick={saveTx} className="flex-1 neo-inset bg-blue-700 text-white font-bold rounded-xl py-4 flex items-center justify-center gap-2 hover:brightness-110 transition-all uppercase tracking-widest"><Icons.Check size={20} /> Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGroupModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm px-4">
                            <div className="neo-page-panel w-full max-w-sm p-6 animate-in">
                                <h3 className="text-lg font-bold text-white mb-4">Editar Grupo</h3>
                                <label className="text-xs text-slate-400 uppercase font-bold">Nombre del Grupo</label>
                                <input type="text" value={groupEditData.newName} onChange={e => setGroupEditData({...groupEditData, newName: e.target.value})} className="w-full neo-page-inset p-3 text-white outline-none mb-4 mt-1" />
                                <label className="text-xs text-slate-400 uppercase font-bold mb-2 block">Color Personalizado</label>
                                <div className="flex flex-wrap gap-2 mb-6">
                                    {COLOR_PALETTE.map(c => (<button key={c} onClick={() => setGroupEditData({...groupEditData, color: c})} className={`w-8 h-8 rounded-full transition-transform ${groupEditData.color === c ? 'scale-110 border-2 border-white' : 'opacity-70 hover:opacity-100'}`} style={{backgroundColor: c}}></button>))}
                                </div>
                                <div className="flex gap-3">
                                    <button onClick={deleteGroup} className="neo-page-button w-12 text-rose-500 hover:text-rose-400" title="Eliminar Grupo"><Icons.Trash2 size={20}/></button>
                                    <button onClick={() => setShowGroupModal(false)} className="flex-1 py-3 neo-page-button text-slate-400 font-bold">Cancelar</button>
                                    <button onClick={saveGroupEdit} className="flex-1 py-3 neo-panel text-white font-bold">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="md:hidden fixed bottom-0 left-0 right-0 h-20 neo-nav flex justify-around items-center px-2 z-40 pb-2">
                        <button onClick={() => { setView('dashboard'); setSelectedFutureMonth(null); }} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${view === 'dashboard' ? 'text-blue-500' : 'text-slate-500'}`}><Icons.PieChart size={22} /> <span className="text-[9px] font-bold uppercase tracking-wider">Hoy</span></button>
                        <button onClick={() => setView('future')} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${view === 'future' ? 'text-blue-500' : 'text-slate-500'}`}><Icons.Calendar size={22} /> <span className="text-[9px] font-bold uppercase tracking-wider">Futuro</span></button>
                        <button onClick={openAdd} className="neo-panel w-14 h-14 flex items-center justify-center -mt-8"><Icons.Plus size={28} /></button>
                        <button onClick={() => setView('insights')} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${view === 'insights' ? 'text-blue-500' : 'text-slate-500'}`}><Icons.BarChart2 size={22} /> <span className="text-[9px] font-bold uppercase tracking-wider">Análisis</span></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
