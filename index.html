            --bg-page: #0b1120;

            --shadow-page-light: #10182d;
            
            /* Recuadros Azules Claros/Medios */
            --bg-card: #1e3a8a; 
            --shadow-card-dark: #152961;
            --shadow-card-light: #274bb3;
        }

        html, body { height: 100%; margin: 0; padding: 0; background-color: var(--bg-page); color: white; }

        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
        
        /* Neumorphism Base Styles */
        .neo-panel {
            background-color: var(--bg-card);
            border-radius: 1.25rem;
            box-shadow: 8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light);
            color: white;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .neo-panel-custom {
            border-radius: 1.25rem;
            box-shadow: 8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light);
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .neo-inset {
            background-color: var(--bg-card);
            border-radius: 0.75rem;
            box-shadow: inset 4px 4px 8px var(--shadow-card-dark), inset -4px -4px 8px var(--shadow-card-light);
            color: white;
            border: 1px solid rgba(255,255,255,0.02);
        }
        
        .neo-button {
            background-color: var(--bg-card);
            border-radius: 9999px;
            box-shadow: 4px 4px 8px var(--shadow-card-dark), -4px -4px 8px var(--shadow-card-light);
            color: white;
            transition: all 0.2s ease-in-out;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        .neo-button:active {
            box-shadow: inset 4px 4px 8px var(--shadow-card-dark), inset -4px -4px 8px var(--shadow-card-light);
            border-color: transparent;
        }

        /* Page Level Neumorphism */
        .neo-page-panel {
            background-color: var(--bg-page);
            border-radius: 1.25rem;
            box-shadow: 8px 8px 16px var(--shadow-page-dark), -8px -8px 16px var(--shadow-page-light);
            color: white;
        }

        .neo-page-inset {
            background-color: var(--bg-page);
            border-radius: 9999px;
            box-shadow: inset 4px 4px 8px var(--shadow-page-dark), inset -4px -4px 8px var(--shadow-page-light);

        // --- GLOBAL HELPER FUNCTIONS ---
        const cleanFirestoreData = (obj) => {
            const cleaned = {};
            Object.keys(obj).forEach(key => {
                if (obj[key] !== undefined) {
                    cleaned[key] = obj[key];
                }
            });
            return cleaned;
        };

        const toLocalDateString = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        const parseDate = (str) => {
            if(!str) return new Date();
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        };
        
        const getBillingMonth = () => {
            const today = new Date(); 
            if (today.getDate() >= 15) {
                return new Date(today.getFullYear(), today.getMonth() + 1, 1);
            }
            return new Date(today.getFullYear(), today.getMonth(), 1);
        };

        const getPaymentForMonth = (tx, month, year) => {
             let date = parseDate(tx.date);
             if (tx.subtype === 'credit' && date.getDate() >= 15) {
                 date = new Date(date.getFullYear(), date.getMonth() + 1, 1);
             }
             if (tx.installments > 1) {
                 const start = date.getFullYear() * 12 + date.getMonth();
                 const target = year * 12 + month;
                 if (target >= start && target < start + tx.installments) return tx.amount / tx.installments;
                 return 0;
             }
             if (tx.subtype === 'fixed') return tx.amount;
             if (date.getMonth() === month && date.getFullYear() === year) return tx.amount;
             return 0;
        };

            Pin: (p) => <svg {...p} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.5c0-1.5-2-3.5-2-5.5v-3c0-1.7-1.3-3-3-3h-4c-1.7 0-3 1.3-3 3v3c0 2-2 4-2 5.5V17z"></path></svg>,

        const legacyIconMap = {
            'shopping': 'shopping-bag', 'cart': 'shopping-cart', 'food': 'coffee', 'transport': 'car', 'bus': 'bus', 'home': 'house', 'utilities': 'lightning', 'water': 'drop', 'tech': 'device-mobile', 'laptop': 'laptop', 'gift': 'gift', 'health': 'heart', 'education': 'book', 'entertainment': 'film-strip', 'music': 'music-notes', 'travel': 'airplane', 'gym': 'barbell', 'pets': 'paw-print', 'tools': 'wrench', 'credit-card': 'credit-card', 'cash': 'money', 'bank': 'bank', 'other': 'chart-pie'

            const imgSource = item.imageUrl || item.image;
            if (imgSource) {
                if (item.imageAsIcon) {
                    const iconColor = item.imageColor === 'custom' ? (item.color || '#1e3a8a') : '#ffffff';
                    return (
                        <div style={{
                            backgroundColor: iconColor,
                            WebkitMaskImage: `url(${imgSource})`,
                            WebkitMaskSize: 'contain',
                            WebkitMaskRepeat: 'no-repeat',
                            WebkitMaskPosition: 'center',
                            maskImage: `url(${imgSource})`,
                            maskSize: 'contain',
                            maskRepeat: 'no-repeat',
                            maskPosition: 'center',
                            width: '60%',
                            height: '60%',
                            opacity: isPaid ? 0.5 : 1
                        }} />
                    );
                }
                return <img src={imgSource} className={`w-full h-full object-cover ${isPaid ? 'grayscale opacity-50' : ''}`} />;
            }
            
            let iconName = item.icon || defaultIcon;
            if (legacyIconMap[iconName]) iconName = legacyIconMap[iconName];
            return <i className={`ph ph-${iconName.replace(/^ph-/, '')} ${isPaid ? 'opacity-50' : ''}`} style={{ fontSize: '1.5rem' }}></i>;
        };

        const COLOR_PALETTE = [
            '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16', 
            '#22c55e', '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', 
            '#3b82f6', '#2563eb', '#1d4ed8', '#1e3a8a', '#4f46e5', 
            '#8b5cf6', '#a855f7', '#d946ef', '#ec4899', '#f43f5e', 
            '#64748b', '#475569', '#334155', '#1e293b', '#0f172a'
        ];

        // --- COMPONENTS ---
        const NeoCard = ({ children, className = '', onClick, style }) => (
            <div 
                onClick={onClick} 
                className={`neo-panel-custom p-4 md:p-6 relative transition-all duration-200 ${className} ${onClick ? 'cursor-pointer active:scale-[0.99] hover:brightness-110' : ''}`}
                style={style}
            >
                {children}
            </div>
        );

        const ReceiptModal = ({ tx, onClose, onEdit }) => {
            if (!tx) return null;

            const { actualStartDate, endDate } = useMemo(() => {
                let sd = parseDate(tx.date);
                if (tx.subtype === 'credit' && sd.getDate() >= 15) {
                    sd = new Date(sd.getFullYear(), sd.getMonth() + 1, 1);
                }
                const ed = new Date(sd.getFullYear(), sd.getMonth() + (tx.installments || 1) - 1, 1);
                return { actualStartDate: sd, endDate: ed };
            }, [tx.date, tx.subtype, tx.installments]);

            const startStr = actualStartDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' });
            const endStr = endDate.toLocaleString('es-ES', { month: 'long', year: 'numeric' });

            const currentQuota = tx.installments > 1 ? tx.quotaInfo?.current || 1 : 1;
            const totalQuota = tx.installments || 1;
            const percentage = (currentQuota / totalQuota) * 100;
            const amountStr = (tx.amount / totalQuota).toLocaleString('es-AR');

            const handleShare = () => {
                const text = `*Comprobante de ${tx.type === 'income' ? 'Ingreso' : 'Gasto'}*\n\n` +
                    `📝 *${tx.description}*\n` +
                    `💰 $${amountStr}\n` +
                    (tx.installments > 1 ? `📊 Cuotas: ${totalQuota}\n` : '') +
                    `📅 Fecha: ${tx.date}\n` +
                    `🏷️ Categoría: ${tx.category}`;
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            };

            return (
                <div className="fixed inset-0 z-[70] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm p-4 animate-in">
                    <div className="neo-panel w-full max-w-sm overflow-hidden relative border-none">
                        <div className="h-28 w-full relative" style={{ backgroundColor: tx.color || '#1e3a8a' }}>
                            <div className="absolute top-4 right-4 flex gap-2">
                                <button onClick={() => { onClose(); onEdit(tx); }} className="neo-button w-10 h-10"><Icons.Edit3 size={18}/></button>
                                <button onClick={onClose} className="neo-button w-10 h-10"><Icons.X size={18}/></button>
                            </div>
                        </div>
                        <div className="p-6 -mt-12 relative">
                            <div className="neo-inset p-6 pt-10 text-center border-none relative mt-4">
                                <div className="absolute -top-12 left-1/2 -translate-x-1/2 w-20 h-20 rounded-full flex items-center justify-center text-white text-3xl shadow-lg border-4 border-[#0b1120] overflow-hidden" style={{backgroundColor: tx.color || '#1e3a8a'}}>
                                    {renderIconOrImage(tx)}
                                </div>
                                <h2 className="text-xl font-bold text-white mb-1 mt-2">{tx.description}</h2>
                                <p className="text-sm text-sky-200 uppercase font-bold tracking-wide">{tx.groupName}</p>
                                <div className="my-6 border-t border-dashed border-white/20"></div>
                                <div className="flex justify-between items-end mb-2">
                                    <span className="text-white/70 text-xs font-bold uppercase">Monto Cuota</span>
                                    <span className="text-3xl font-bold text-white">${amountStr}</span>
                                </div>
                                {tx.installments > 1 && (
                                    <>
                                        <div className="mt-4 bg-black/20 p-3 rounded-xl text-left">
                                            <div className="flex justify-between text-xs text-white/70 mb-1">
                                                <span>Inicio: <strong className="text-white capitalize">{startStr}</strong></span>
                                                <span>Fin: <strong className="text-white capitalize">{endStr}</strong></span>
                                            </div>
                                            <div className="flex justify-between text-xs font-bold text-white/70 mt-3 mb-2">
                                                <span>Cuota {currentQuota} de {totalQuota}</span>
                                                <span>{percentage.toFixed(0)}%</span>
                                            </div>
                                            <div className="w-full bg-black/40 h-2 rounded-full overflow-hidden">
                                                <div className="h-full rounded-full transition-all duration-1000 bg-sky-300" style={{ width: `${percentage}%` }}></div>
                                            </div>
                                            <p className="text-[10px] text-white/50 mt-2 text-left">Total Original: ${tx.amount.toLocaleString('es-AR')}</p>
                                        </div>
                                    </>
                                )}
                                <button onClick={handleShare} className="mt-6 w-full py-3 neo-button font-bold gap-2"><Icons.Share size={18}/> Compartir</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const GroupedList = ({ transactions, monthIndex, year, onSelect, onEdit, groupMeta, onEditGroup, checklistMode, onToggleGroupPaid, onTogglePaid }) => {
            const [expandedGroups, setExpandedGroups] = useState({});

            const toggleGroup = (groupName) => {
                setExpandedGroups(prev => ({ ...prev, [groupName]: !prev[groupName] }));
            };

            const getQuotaInfo = (tx) => {
                if (tx.installments <= 1) return null;
                let date = parseDate(tx.date);
                if (tx.subtype === 'credit' && date.getDate() >= 15) {
                     date = new Date(date.getFullYear(), date.getMonth() + 1, 1);
                }
                const start = date.getFullYear() * 12 + date.getMonth();
                const target = year * 12 + monthIndex;
                const current = target - start + 1;
                return { current, total: tx.installments };
            };

            const groups = useMemo(() => {
                const grps = {};
                transactions.forEach(t => {
                    const val = getPaymentForMonth(t, monthIndex, year);
                    
                    if (val > 0) {
                        const gName = t.groupName || 'Varios';
                        const meta = groupMeta.find(g => g.name === gName) || {}; 
                        let color = meta.color || '#1e3a8a';
                        
                        if (!meta.color) {
                            const lower = gName.toLowerCase();
                            if (lower.includes('naranja')) color = '#ea580c';
                            else if (lower.includes('galicia')) color = '#d97706';
                            else if (lower.includes('icbc')) color = '#dc2626';
                            else if (lower.includes('a pagar')) color = '#475569';
                            else if (lower.includes('ingreso')) color = '#059669';
                        }
                        
                        const monthKey = `${year}-${monthIndex}`;
                        const isPaidForMonth = t.paidMonths && t.paidMonths.includes(monthKey);

                        if (!grps[gName]) grps[gName] = { total: 0, items: [], color, meta };
                        grps[gName].items.push({ ...t, currentAmt: val, quotaInfo: getQuotaInfo(t), isPaidForMonth });
                        grps[gName].total += val;
                    }
                });
                
                Object.values(grps).forEach(group => {
                    group.items.sort((a, b) => b.currentAmt - a.currentAmt);
                });
                
                return grps;
            }, [transactions, monthIndex, year, groupMeta]);

            if (Object.keys(groups).length === 0) return <div className="flex flex-col items-center justify-center py-10 text-slate-400 gap-4"><Icons.PieChart size={48} className="opacity-50" /><p>No hay movimientos en este mes.</p></div>;

            return (
                <div className="space-y-6 pb-20">
                    {Object.entries(groups).map(([groupName, data]) => {
                        const isExpanded = !!expandedGroups[groupName];
                        const monthKey = `${year}-${monthIndex}`;
                        const allPaid = data.items.every(tx => tx.paidMonths && tx.paidMonths.includes(monthKey));

                        return (
                        <div key={groupName} className="animate-in">
                            <div className="neo-panel-custom mb-3 p-4 flex items-center justify-between cursor-pointer transition-all hover:brightness-110" style={{ backgroundColor: data.color }} onClick={() => toggleGroup(groupName)}>
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-lg bg-black/20 flex items-center justify-center text-white overflow-hidden shrink-0">
                                        {renderIconOrImage(data.meta, false, 'credit-card')}
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div>
                                            <h3 className="text-white font-bold text-lg md:text-xl leading-tight uppercase tracking-wide">
                                                {groupName}
                                            </h3>
                                            <p className="text-white/60 text-[10px] md:text-xs font-medium">TOTAL DEL GRUPO</p>
                                        </div>
                                        <button onClick={(e) => { e.stopPropagation(); onEditGroup(groupName, data.color); }} className="opacity-70 hover:opacity-100 transition p-2 bg-white/10 rounded-full ml-2" title="Editar Grupo"><Icons.Edit3 size={14}/></button>
                                    </div>
                                </div>
                                <div className="flex items-center gap-4">
                                    {checklistMode && (
                                        <button 
                                            onClick={(e) => { e.stopPropagation(); onToggleGroupPaid(data.items, monthIndex, year); }} 
                                            className={`p-2 rounded-lg transition-colors ${allPaid ? 'bg-emerald-500 text-white' : 'bg-black/20 text-white/50 hover:bg-black/40 hover:text-white'}`}
                                            title="Tachar todos"
                                        >
                                            <Icons.CheckSquare size={18} />
                                        </button>
                                    )}
                                    <div className="text-right"><span className="text-xl md:text-2xl font-bold text-white">${data.total.toLocaleString('es-AR')}</span></div>
                                    <Icons.ChevronDown size={20} className={`text-white/50 transform transition-transform duration-300 ${isExpanded ? 'rotate-180' : ''}`} />
                                </div>
                            </div>

                            {isExpanded && (
                            <div className="grid gap-3 mb-6 pl-2 border-l-2 border-white/10">
                                {data.items.map(tx => (
                                    <div 
                                        key={tx.id} 
                                        onClick={() => checklistMode ? onTogglePaid(tx, monthIndex, year) : onSelect(tx)}
                                        className={`neo-panel p-3 md:p-5 flex items-center gap-4 transition-all duration-200 cursor-pointer border-l-4 ${tx.isPaidForMonth ? 'opacity-60 bg-[#064e3b]' : ''}`}
                                        style={{ borderLeftColor: tx.isPaidForMonth ? '#10b981' : (tx.color || '#1e3a8a') }}
                                    >
                                        <div className={`relative w-10 h-10 md:w-12 md:h-12 rounded-full flex-shrink-0 flex items-center justify-center overflow-hidden shadow-inner ${tx.isPaidForMonth ? 'opacity-50 grayscale' : ''}`} style={{ backgroundColor: tx.color || '#3b82f6' }}>
                                            <div className="text-white flex items-center justify-center w-full h-full">
                                                {renderIconOrImage(tx)}
                                            </div>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <div className="flex justify-between items-start">
                                                <h4 className={`font-bold truncate pr-2 text-sm md:text-lg ${tx.isPaidForMonth ? 'line-through text-emerald-200' : 'text-white'}`}>{tx.description}</h4>
                                                <span className={`font-bold text-sm md:text-lg whitespace-nowrap ${tx.type === 'income' ? 'text-emerald-300' : tx.isPaidForMonth ? 'line-through text-emerald-200' : 'text-white'}`}>
                                                    {tx.type === 'income' ? '+' : ''}${tx.currentAmt.toLocaleString('es-AR')}
                                                </span>
                                            </div>
                                            <div className="flex justify-between items-center mt-1">
                                                <p className={`text-xs md:text-sm flex items-center gap-1 ${tx.isPaidForMonth ? 'text-emerald-300/70' : 'text-white/70'}`}>{tx.category}</p>
                                                {tx.quotaInfo && (
                                                    <div className={`flex items-center px-2 py-0.5 rounded-md bg-black/20`}>
                                                        <span className={`text-[10px] md:text-xs font-mono font-bold ${tx.isPaidForMonth ? 'text-emerald-300' : 'text-sky-200'}`}>{tx.quotaInfo.current}/{tx.quotaInfo.total}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        {checklistMode && tx.isPaidForMonth && <div className="text-emerald-300"><Icons.Check size={20} /></div>}
                                    </div>
                                ))}
                            </div>
                            )}
                        </div>
                    )})}
                </div>
            );
        };

        // --- APP LOGIC ---
        const App = () => {
            const [fixedMonthStr, setFixedMonthStr] = useState(localStorage.getItem('fixedMonthStr'));

            const [currentDate, setCurrentDate] = useState(() => {
                const saved = localStorage.getItem('fixedMonthStr');
                if (saved) {
                    const [y, m] = saved.split('-');
                    return new Date(Number(y), Number(m), 1);
                }
                return getBillingMonth();
            }); 
            
            const isMonthFixed = fixedMonthStr === `${currentDate.getFullYear()}-${currentDate.getMonth()}`;

            const [transactions, setTransactions] = useState([]);
            const [groupMeta, setGroupMeta] = useState([]); 
            const [view, setView] = useState('dashboard');
            const [selectedFutureMonth, setSelectedFutureMonth] = useState(null);
            const [installPrompt, setInstallPrompt] = useState(null); 
            const [checklistMode, setChecklistMode] = useState(false); 
            const [searchQuery, setSearchQuery] = useState("");
            
            const [showModal, setShowModal] = useState(false);
            const [showImportModal, setShowImportModal] = useState(false);
            const [showGroupModal, setShowGroupModal] = useState(false);
            const [showReceipt, setShowReceipt] = useState(null); 
            
            const [editingId, setEditingId] = useState(null);
            const [groupEditData, setGroupEditData] = useState({ oldName: '', newName: '', color: '', icon: '', image: '', imageUrl: '', imageAsIcon: false, imageColor: 'white' });
            const [importText, setImportText] = useState("");

            const [formData, setFormData] = useState({
                type: 'expense', subtype: 'one-time', amount: '', description: '', category: '', 
                groupName: 'A PAGAR', installments: 1, currentInstallment: 1, icon: 'shopping-bag', color: '#1e3a8a',
                image: '', imageUrl: '', imageAsIcon: false, imageColor: 'white'
            });

            const [dbReady, setDbReady] = useState(false);
            const [isSaving, setIsSaving] = useState(false);

            const toggleFixedMonth = () => {
                const str = `${currentDate.getFullYear()}-${currentDate.getMonth()}`;
                if (isMonthFixed) {
                    localStorage.removeItem('fixedMonthStr');
                    setFixedMonthStr(null);
                } else {
                    localStorage.setItem('fixedMonthStr', str);
                    setFixedMonthStr(str);
                }
            };

            const navigateMonth = (offset) => {
                const newDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + offset, 1);
                setCurrentDate(newDate);
            };

            const availableCategories = useMemo(() => {
                const cats = new Set(transactions.map(t => t.category).filter(Boolean));
                return Array.from(cats);
            }, [transactions]);
            
            const availableGroups = useMemo(() => {
                const groupSet = new Set();
                groupSet.add("A PAGAR"); groupSet.add("NARANJA"); groupSet.add("TARJETA GALICIA"); groupSet.add("ICBC"); groupSet.add("Ingresos"); 
                transactions.forEach(t => { if (t.groupName) groupSet.add(t.groupName); });
                groupMeta.forEach(g => { if (g.name) groupSet.add(g.name); });
                return Array.from(groupSet).sort();
            }, [transactions, groupMeta]);

            useEffect(() => {
                window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setInstallPrompt(e); });
            }, []);

            const handleInstall = () => {
                if (!installPrompt) {
                    alert("Instrucciones: En el menú de tu navegador, selecciona 'Añadir a la pantalla de inicio' o 'Instalar aplicación'.");
                    return;
                }
                installPrompt.prompt();
                installPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') setInstallPrompt(null);
                });
            };

            useEffect(() => {
                const initDb = () => {
                    const { collection, query, orderBy, onSnapshot } = window.fb;
                    const db = window.firebaseDB;
                    const auth = window.firebaseAuth;
                    const signIn = window.signInAnonymously;

                    if (db && auth && signIn) {
                        signIn(auth).then(() => {
                            setDbReady(true);
                            onSnapshot(query(collection(db, TRANSACTIONS_COL), orderBy("date", "desc")), (snap) => setTransactions(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                            onSnapshot(collection(db, GROUPS_COL), (snap) => setGroupMeta(snap.docs.map(d => d.data())));
                        }).catch(e => console.error(e));
                    }
                };
                if (window.firebaseDB) initDb();
                else window.addEventListener('firebase-modules-ready', initDb);
                return () => window.removeEventListener('firebase-modules-ready', initDb);
            }, []);

            const insights = useMemo(() => {
                const m = currentDate.getMonth(); const y = currentDate.getFullYear();
                
                const activeExpensesThisMonth = transactions.filter(t => {
                    if (t.type !== 'expense') return false;
                    return getPaymentForMonth(t, m, y) > 0;
                });

                const mostExpensive = [...activeExpensesThisMonth].sort((a,b) => getPaymentForMonth(b,m,y) - getPaymentForMonth(a,m,y)).slice(0, 5);
                
                const creditTx = activeExpensesThisMonth.filter(t => t.subtype === 'credit');
                
                const creditTxWithRemaining = creditTx.map(t => {
                    let txDate = parseDate(t.date);
                    if (txDate.getDate() >= 15) {
                        txDate = new Date(txDate.getFullYear(), txDate.getMonth() + 1, 1);
                    }
                    const startMonthIndex = txDate.getFullYear() * 12 + txDate.getMonth();
                    const currentMonthIndex = y * 12 + m;
                    const currentQuota = Math.max(1, currentMonthIndex - startMonthIndex + 1);
                    return { ...t, remaining: Math.max(0, (t.installments || 1) - currentQuota) };
                });

                const closestToFinish = creditTxWithRemaining.filter(t => t.remaining > 0).sort((a,b) => a.remaining - b.remaining).slice(0, 5);
                const longestRemaining = creditTxWithRemaining.filter(t => t.remaining > 0 && (t.amount/(t.installments||1)) > 20000).sort((a,b) => b.remaining - a.remaining).slice(0, 5);
                
                return { mostExpensive, closestToFinish, longestRemaining };
            }, [transactions, currentDate]);

            const dashboardTotals = useMemo(() => {
                const m = currentDate.getMonth(); const y = currentDate.getFullYear(); let expense = 0; let income = 0;
                transactions.filter(t => !searchQuery || (t.description||"").toLowerCase().includes(searchQuery.toLowerCase())).forEach(t => {
                    const val = getPaymentForMonth(t, m, y);
                    if (t.type === 'income') income += val;
                    else expense += val; 
                });
                return { expense, income, balance: income - expense };
            }, [transactions, currentDate, searchQuery]);

            const futureData = useMemo(() => {
                const data = [];
                for(let i=0; i<24; i++) {
                    const d = new Date(currentDate.getFullYear(), currentDate.getMonth() + i, 1); 
                    const m = d.getMonth(); const y = d.getFullYear(); let total = 0, tarjetas = 0;
                    transactions.forEach(t => {
                        const val = getPaymentForMonth(t, m, y);
                        if(t.type === 'expense' && val > 0) {
                             total += val; 
                             if (t.installments > 1 || (t.groupName||'').toLowerCase().includes('tarjeta')) tarjetas += val; 
                        }
                    });
                    data.push({ name: d.toLocaleString('es-ES', { month: 'short' }).toUpperCase() + " '" + y.toString().slice(2), total, tarjetas, index: m, year: y });
                }
                return data;
            }, [transactions, currentDate]);

            const exportToExcel = () => {
                const data = transactions.map(tx => ({ Fecha: tx.date, Descripción: tx.description, Grupo: tx.groupName, Categoría: tx.category, Monto_Total: tx.amount, Cuotas_Totales: tx.installments || 1, Tipo: tx.type === 'income' ? 'Ingreso' : 'Gasto' }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Finanzas");
                XLSX.writeFile(wb, "Finanzas_Familia.xlsx");
            };

            const togglePaid = async (tx, monthIndex, year) => { 
                if (!dbReady) return; 
                try { 
                    const monthKey = `${year}-${monthIndex}`;
                    const paidMonths = tx.paidMonths || [];
                    const isCurrentlyPaid = paidMonths.includes(monthKey);
                    const newPaidMonths = isCurrentlyPaid ? paidMonths.filter(m => m !== monthKey) : [...paidMonths, monthKey];

                    const { doc, updateDoc } = window.fb; 
                    await updateDoc(doc(window.firebaseDB, TRANSACTIONS_COL, tx.id), { paidMonths: newPaidMonths }); 
                } catch (e) { console.error(e); alert("Error al actualizar pago."); } 
            };

            const toggleGroupPaid = async (groupItems, monthIndex, year) => {
                 if (!dbReady) return; 
                 try {
                     const monthKey = `${year}-${monthIndex}`;
                     const { doc, writeBatch } = window.fb;
                     const batch = writeBatch(window.firebaseDB);
                     
                     const allPaid = groupItems.every(tx => tx.paidMonths && tx.paidMonths.includes(monthKey));
                     
                     groupItems.forEach(tx => {
                         const paidMonths = tx.paidMonths || [];
                         let newPaidMonths;
                         if (allPaid) {
                             newPaidMonths = paidMonths.filter(m => m !== monthKey);
                         } else {
                             newPaidMonths = paidMonths.includes(monthKey) ? paidMonths : [...paidMonths, monthKey];
                         }
                         batch.update(doc(window.firebaseDB, TRANSACTIONS_COL, tx.id), { paidMonths: newPaidMonths });
                     });
                     
                     await batch.commit();
                 } catch (e) { console.error(e); alert("Error al tachar grupo."); }
            };

            const openAdd = () => { setEditingId(null); setFormData({ type: 'expense', subtype: 'one-time', amount: '', description: '', category: '', groupName: 'A PAGAR', installments: 1, currentInstallment: 1, icon: 'shopping-bag', color: '#1e3a8a', date: toLocalDateString(currentDate), image: '', imageUrl: '', imageAsIcon: false, imageColor: 'white' }); setShowModal(true); };
            
            const openEdit = (tx) => { 
                setEditingId(tx.id); 
                let currentQuota = 1; 
                if(tx.subtype === 'credit') {
                    const txDate = parseDate(tx.date); 
                    const monthsDiff = (currentDate.getFullYear() - txDate.getFullYear()) * 12 + (currentDate.getMonth() - txDate.getMonth());
                    currentQuota = Math.max(1, monthsDiff + 1);
                }
                setFormData({ ...tx, amount: tx.amount, currentInstallment: currentQuota, imageUrl: tx.imageUrl || '', imageAsIcon: tx.imageAsIcon || false, imageColor: tx.imageColor || 'white' }); 
                setShowModal(true); 
            };
            
            const saveTx = async () => {
                if (!formData.description) return alert("Por favor ingresa una descripción.");
                if (!formData.amount || Number(formData.amount) <= 0) return alert("Por favor ingresa un monto válido mayor a 0.");

                try {
                    let finalDate = editingId ? formData.date : formData.date || toLocalDateString(currentDate);
                    
                    if (formData.subtype === 'credit' && formData.currentInstallment > 1) { 
                        const targetDate = new Date(currentDate); 
                        targetDate.setMonth(targetDate.getMonth() - (formData.currentInstallment - 1)); 
                        finalDate = toLocalDateString(targetDate); 
                    }
                    if(formData.date && formData.date !== finalDate && editingId) finalDate = formData.date; 

                    let txData = { ...formData, amount: Number(formData.amount), date: finalDate };
                    delete txData.currentInstallment; 
                    if (txData.type === 'income') { 
                        if (!txData.groupName || txData.groupName === 'A PAGAR') txData.groupName = "Ingresos"; 
                    }
                    
                    txData = cleanFirestoreData(txData);

                    const { collection, addDoc, updateDoc, doc } = window.fb;
                    if (editingId) await updateDoc(doc(window.firebaseDB, TRANSACTIONS_COL, editingId), txData); 
                    else await addDoc(collection(window.firebaseDB, TRANSACTIONS_COL), txData);
                    setShowModal(false);
                } catch(e) { console.error(e); alert("Error al guardar: " + e.message); }
            };

            const deleteTx = async () => { if (confirm('¿Eliminar definitivamente este movimiento?') && dbReady) { await window.fb.deleteDoc(window.fb.doc(window.firebaseDB, TRANSACTIONS_COL, editingId)); setShowModal(false); } };
            
            const openGroupEdit = (name, currentColor) => { 
                const meta = groupMeta.find(g => g.name === name) || {};
                setGroupEditData({ oldName: name, newName: name, color: meta.color || currentColor, icon: meta.icon || '', image: meta.image || '', imageUrl: meta.imageUrl || '', imageAsIcon: meta.imageAsIcon || false, imageColor: meta.imageColor || 'white' }); 
                setShowGroupModal(true); 
            };
            
            const saveGroupEdit = async () => { 
                if (!groupEditData.newName.trim()) return alert("El nombre del grupo no puede estar vacío.");
                try {
                    const { oldName, newName, color, icon, image, imageUrl, imageAsIcon, imageColor } = groupEditData; 
                    const { doc, writeBatch, collection, query, where, getDocs } = window.fb;
                    const batch = writeBatch(window.firebaseDB); 
                    
                    batch.set(doc(window.firebaseDB, GROUPS_COL, newName), cleanFirestoreData({ name: newName, color, icon, image, imageUrl, imageAsIcon, imageColor })); 
                    if (oldName !== newName) { 
                        batch.delete(doc(window.firebaseDB, GROUPS_COL, oldName)); 
                    } 
                    const snap = await getDocs(query(collection(window.firebaseDB, TRANSACTIONS_COL), where("groupName", "==", oldName))); 
                    snap.forEach(d => batch.update(d.ref, { groupName: newName })); 
                    await batch.commit(); 
                    setShowGroupModal(false); 
                } catch(e) { console.error(e); alert("Error al guardar grupo."); }
            };

            const deleteGroup = async () => { 
                if (confirm(`¿Seguro que deseas eliminar el grupo "${groupEditData.oldName}"? \n\n(Sus gastos no se borrarán, pasarán al grupo "A PAGAR")`)) {
                    try {
                        const { doc, writeBatch, collection, query, where, getDocs } = window.fb;
                        const batch = writeBatch(window.firebaseDB);
                        batch.delete(doc(window.firebaseDB, GROUPS_COL, groupEditData.oldName));
                        const snap = await getDocs(query(collection(window.firebaseDB, TRANSACTIONS_COL), where("groupName", "==", groupEditData.oldName)));
                        snap.forEach(d => batch.update(d.ref, { groupName: 'A PAGAR' }));
                        await batch.commit();
                        setShowGroupModal(false);
                    } catch(e) { console.error(e); alert("Error al eliminar grupo."); }
                }
            };

                if(!dbReady) return; setIsSaving(true);
                const { doc, writeBatch } = window.fb;
                const batch = writeBatch(window.firebaseDB);
                const segments = importText.split('$');
                if (segments.length < 2) { alert("Error formato."); setIsSaving(false); return; }
                let currentDesc = segments[0].trim();
                let currentGroup = "Importado";
                if(currentDesc.includes("A PAGAR")) currentGroup = "A PAGAR";
                for (let i = 1; i < segments.length; i++) {
                    const match = segments[i].trim().match(/^([\d\.]+)/);
                    if (match) {
                        const amount = Number(match[1].replace(/\./g, ''));
                        const rest = segments[i].trim().substring(match[0].length).trim();
                        const quotaMatch = rest.match(/^(\d+)\/(\d+)/);
                        let quotaT = quotaMatch ? Number(quotaMatch[2]) : 1;
                        let nextDesc = quotaMatch ? rest.substring(quotaMatch[0].length).trim() : rest;
                        if (currentDesc.includes("NARANJA")) currentGroup = "NARANJA";
                        if (currentDesc.includes("GALICIA")) currentGroup = "TARJETA GALICIA";
                        if (currentDesc.includes("ICBC")) currentGroup = "ICBC";
                        const ref = doc(window.firebaseDB, TRANSACTIONS_COL, Math.random().toString(36).substr(2,9));
                        const txData = cleanFirestoreData({ type: 'expense', subtype: quotaT > 1 ? 'credit' : 'fixed', amount: amount * quotaT, description: currentDesc.replace(/A PAGAR|NARANJA|TARJETA GALICIA|ICBC/g, '').trim() || "Gasto", category: 'Varios', groupName: currentGroup, date: toLocalDateString(new Date()), installments: quotaT, icon: 'shopping-bag', color: '#1e3a8a' });
                        batch.set(ref, txData);
                        currentDesc = nextDesc;
                    }
                }
                try { await batch.commit(); } catch(e){ console.error(e); alert("Error importando.");}
                setIsSaving(false); setShowImportModal(false); setImportText("");
            };

                                                        type="color" 
                                                        value={formData.color || '#ffffff'}
                                                        onChange={e => setFormData({...formData, color: e.target.value})}
                                                        className="absolute inset-[-20px] w-16 h-16 opacity-0 cursor-pointer"
                                                    />
                                                    <div className="w-3 h-3 bg-white rounded-full pointer-events-none shadow-sm"></div>
                                                </label>
                                            </div>
                                        </div>
                                        <div className="pt-4 border-t border-blue-400 flex flex-col gap-3">
                                            <label className="text-xs text-blue-200 uppercase font-bold tracking-wider flex justify-between">
                                                <span>Icono o Imagen</span>
                                                <a href="https://phosphoricons.com/" target="_blank" className="text-blue-400 underline lowercase font-normal">Galería Phosphor</a>
                                            </label>
                                            <div className="flex gap-4 items-start md:items-center flex-col md:flex-row">
                                                <label className="w-16 h-16 shrink-0 neo-inset flex flex-col items-center justify-center cursor-pointer text-blue-300 hover:text-white rounded-xl overflow-hidden relative group">
                                                    {(formData.image || formData.imageUrl) ? 
                                                        (formData.imageAsIcon ? <div style={{backgroundColor: 'white', WebkitMaskImage: `url(${formData.image || formData.imageUrl})`, WebkitMaskSize: 'contain', WebkitMaskRepeat: 'no-repeat', WebkitMaskPosition: 'center', width: '60%', height: '60%'}}></div> : <img src={formData.image || formData.imageUrl} className="w-full h-full object-cover" />)
                                                        : <Icons.Image size={24}/>
                                                    }
                                                    {(formData.image || formData.imageUrl) && (
                                                        <div 
                                                            className="absolute inset-0 bg-rose-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                                                            onClick={(e) => { e.preventDefault(); setFormData({...formData, image: '', imageUrl: '', imageAsIcon: false}); }}
                                                        >
                                                            <Icons.Trash2 size={24} className="text-white" />
                                                        </div>
                                                    )}
                                                    <input type="file" className="hidden" onChange={handleFile} accept="image/*"/>
                                                </label>
                                                <div className="flex flex-col gap-2 flex-1 w-full">
                                                    <input 
                                                        type="text" 
                                                        placeholder="Nombre del icono (Ej: car)" 
                                                        value={formData.icon || ''} 
                                                        onChange={e => setFormData({...formData, icon: e.target.value, image: '', imageUrl: ''})} 
                                                        className="w-full neo-inset px-4 py-3 text-white text-sm outline-none placeholder:text-blue-300"
                                                    />
                                                    <input 
                                                        type="text" 
                                                        placeholder="URL de imagen web..." 
                                                        value={formData.imageUrl || ''} 
                                                        onChange={e => setFormData({...formData, imageUrl: e.target.value, icon: '', image: ''})} 
                                                        className="w-full neo-inset px-4 py-3 text-white text-sm outline-none placeholder:text-blue-300"
                                                    />
                                                </div>
                                                <div className="w-16 h-16 shrink-0 rounded-full flex items-center justify-center text-white text-3xl shadow-lg border-2 border-white/20 hidden md:flex" style={{backgroundColor: formData.color || '#1e3a8a'}}>
                                                    {renderIconOrImage(formData)}
                                                </div>
                                            </div>
                                            {(formData.image || formData.imageUrl) && (
                                                <div className="flex items-center justify-between bg-black/20 p-3 rounded-xl mt-2 border border-white/5">
                                                    <label className="flex items-center gap-2 text-sm text-white font-medium cursor-pointer">
                                                        <input type="checkbox" checked={formData.imageAsIcon || false} onChange={e => setFormData({...formData, imageAsIcon: e.target.checked})} className="accent-blue-500 w-4 h-4"/>
                                                        Convertir en silueta
                                                    </label>
                                                    {formData.imageAsIcon && (
                                                        <select value={formData.imageColor || 'white'} onChange={e => setFormData({...formData, imageColor: e.target.value})} className="bg-white/10 border border-white/20 rounded-lg p-1.5 text-sm text-white outline-none">
                                                            <option value="white" className="text-black">Blanco</option>
                                                            <option value="custom" className="text-black">Color de Etiqueta</option>
                                                        </select>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                                <div className="p-5 flex gap-4 bg-[#0b1120] border-t border-white/5 shrink-0 max-w-4xl mx-auto w-full">
                                    {editingId && <button onClick={deleteTx} className="neo-panel w-14 h-14 flex items-center justify-center text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 transition-colors"><Icons.Trash2 size={24} /></button>}
                                    <button onClick={saveTx} className="flex-1 bg-blue-600 text-white font-bold rounded-xl py-4 flex items-center justify-center gap-2 hover:brightness-110 transition-all uppercase tracking-widest shadow-[0_0_20px_rgba(37,99,235,0.4)]"><Icons.Check size={20} /> Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showGroupModal && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm px-4">
                            <div className="neo-page-panel w-full max-w-sm p-6 animate-in">
                                <h3 className="text-lg font-bold text-white mb-4">Editar Grupo</h3>
                                <label className="text-xs text-slate-400 uppercase font-bold">Nombre del Grupo</label>
                                <input type="text" value={groupEditData.newName} onChange={e => setGroupEditData({...groupEditData, newName: e.target.value})} className="w-full neo-page-inset p-3 text-white outline-none mb-4 mt-1" />
                                
                                <label className="text-xs text-slate-400 uppercase font-bold mb-2 block">Color Personalizado</label>
                                <div className="flex flex-wrap gap-2 mb-6">
                                    {COLOR_PALETTE.map(c => (<button key={c} onClick={() => setGroupEditData({...groupEditData, color: c})} className={`w-8 h-8 rounded-full transition-transform ${groupEditData.color === c ? 'scale-110 border-2 border-white shadow-lg' : 'opacity-70 hover:opacity-100 hover:scale-105'}`} style={{backgroundColor: c}}></button>))}
                                    <label className="relative w-8 h-8 rounded-full border-2 border-white shadow-md cursor-pointer flex items-center justify-center overflow-hidden hover:scale-110 transition-transform" style={{ background: 'conic-gradient(red, yellow, lime, cyan, blue, magenta, red)' }} title="Color personalizado">
                                        <input 
                                            type="color" 
                                            value={groupEditData.color || '#ffffff'}
                                            onChange={e => setGroupEditData({...groupEditData, color: e.target.value})}
                                            className="absolute inset-[-20px] w-16 h-16 opacity-0 cursor-pointer"
                                        />
                                        <div className="w-3 h-3 bg-white rounded-full pointer-events-none shadow-sm"></div>
                                    </label>
                                </div>
                                
                                <label className="text-xs text-slate-400 uppercase font-bold mb-2 block">Icono o Imagen</label>
                                <div className="flex flex-col gap-4 mb-8">
                                    <div className="flex gap-4 items-center">
                                        <label className="w-14 h-14 shrink-0 neo-page-inset flex flex-col items-center justify-center cursor-pointer text-slate-400 hover:text-white rounded-xl overflow-hidden relative group">
                                            {(groupEditData.image || groupEditData.imageUrl) ? 
                                                (groupEditData.imageAsIcon ? <div style={{backgroundColor: 'white', WebkitMaskImage: `url(${groupEditData.image || groupEditData.imageUrl})`, WebkitMaskSize: 'contain', WebkitMaskRepeat: 'no-repeat', WebkitMaskPosition: 'center', width: '60%', height: '60%'}}></div> : <img src={groupEditData.image || groupEditData.imageUrl} className="w-full h-full object-cover" />)
                                                : <Icons.Image size={20}/>
                                            }
                                            {(groupEditData.image || groupEditData.imageUrl) && (
                                                <div 
                                                    className="absolute inset-0 bg-rose-500/80 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity"
                                                    onClick={(e) => { e.preventDefault(); setGroupEditData({...groupEditData, image: '', imageUrl: '', imageAsIcon: false}); }}
                                                >
                                                    <Icons.Trash2 size={16} className="text-white" />
                                                </div>
                                            )}
                                            <input type="file" className="hidden" onChange={handleGroupImageFile} accept="image/*"/>
                                        </label>
                                        <div className="flex flex-col gap-2 flex-1">
                                            <input 
                                                type="text" 
                                                placeholder="Phosphor (Ej: bank)" 
                                                value={groupEditData.icon || ''} 
                                                onChange={e => setGroupEditData({...groupEditData, icon: e.target.value, image: '', imageUrl: ''})} 
                                                className="w-full neo-page-inset p-2 text-white outline-none text-sm" 
                                            />
                                            <input 
                                                type="text" 
                                                placeholder="URL imagen web..." 
                                                value={groupEditData.imageUrl || ''} 
                                                onChange={e => setGroupEditData({...groupEditData, imageUrl: e.target.value, icon: '', image: ''})} 
                                                className="w-full neo-page-inset p-2 text-white outline-none text-sm" 
                                            />
                                        </div>
                                    </div>
                                    {(groupEditData.image || groupEditData.imageUrl) && (
                                        <div className="flex items-center justify-between bg-white/5 p-2 rounded-xl border border-white/10">
                                            <label className="flex items-center gap-2 text-xs text-white cursor-pointer">
                                                <input type="checkbox" checked={groupEditData.imageAsIcon || false} onChange={e => setGroupEditData({...groupEditData, imageAsIcon: e.target.checked})} className="accent-blue-500"/>
                                                Silueta
                                            </label>
                                            {groupEditData.imageAsIcon && (
                                                <select value={groupEditData.imageColor || 'white'} onChange={e => setGroupEditData({...groupEditData, imageColor: e.target.value})} className="bg-transparent border border-white/20 rounded p-1 text-xs text-white outline-none">
                                                    <option value="white" className="text-black">Blanco</option>
                                                    <option value="custom" className="text-black">Color Grupo</option>
                                                </select>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="flex gap-3">
                                    <button onClick={deleteGroup} className="neo-page-button w-12 text-rose-500 hover:text-rose-400" title="Eliminar Grupo"><Icons.Trash2 size={20}/></button>
                                    <button onClick={() => setShowGroupModal(false)} className="flex-1 py-3 neo-page-button text-slate-400 font-bold">Cancelar</button>
                                    <button onClick={saveGroupEdit} className="flex-1 py-3 neo-panel text-white font-bold">Guardar</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="md:hidden fixed bottom-0 left-0 right-0 h-20 neo-nav flex justify-around items-center px-2 z-40 pb-2">
                        <button onClick={() => { setView('dashboard'); setSelectedFutureMonth(null); }} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${view === 'dashboard' ? 'text-blue-500' : 'text-slate-500'}`}><Icons.PieChart size={22} /> <span className="text-[9px] font-bold uppercase tracking-wider">Hoy</span></button>
                        <button onClick={() => setView('future')} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${view === 'future' ? 'text-blue-500' : 'text-slate-500'}`}><Icons.Calendar size={22} /> <span className="text-[9px] font-bold uppercase tracking-wider">Futuro</span></button>
                        <button onClick={openAdd} className="neo-panel w-14 h-14 flex items-center justify-center -mt-8"><Icons.Plus size={28} /></button>
                        <button onClick={() => setView('insights')} className={`flex flex-col items-center gap-1 p-2 w-16 transition-colors ${view === 'insights' ? 'text-blue-500' : 'text-slate-500'}`}><Icons.BarChart2 size={22} /> <span className="text-[9px] font-bold uppercase tracking-wider">Análisis</span></button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
